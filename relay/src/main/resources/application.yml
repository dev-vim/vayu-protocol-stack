server:
  port: 3000

spring:
  application:
    name: vayu-relay

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics

relay:
  epoch:
    duration-seconds: 3600
    commit-check-interval-ms: 60000
    timestamp-tolerance-seconds: 300
    min-reporters-per-cell: 3
    scoring-tolerance-aqi: 50
    epoch-budget-wei: 684931506849315068493
  validation:
    required-h3-resolution: 8
    rate-limit-window-seconds: 300
    min-aqi: 1
    min-pm25: 1
    messages:
      aqi-min: "aqi must be greater than %d"
      pm25-min: "pm25 must be greater than %d"
      timestamp-required: "timestamp is required"
      timestamp-tolerance: "timestamp is outside allowed tolerance window"
      epoch-id-mismatch: "epochId does not match timestamp and epoch duration"
      h3-format: "h3Index must be a 64-bit hex string"
      h3-hex: "h3Index must be valid hex"
      h3-resolution: "h3Index resolution must be %d"
      rate-limit: "reporter can submit once every %d seconds"
  security:
    signature-verification-enabled: false
    stake-check-enabled: false
    eip712:
      domain-name: "VayuProtocol"
      domain-version: "1"
      chain-id: 84532
      verifying-contract: "0x0000000000000000000000000000000000000000"
  ipfs:
    # "kubo" for local dev node (docker run -p 5001:5001 ipfs/kubo)
    # "pinata" for production managed pinning
    provider: kubo
    kubo-api-url: "http://localhost:5001"
    # Set RELAY_IPFS_PINATA_JWT env var in production when provider=pinata
  chain:
    # EVM JSON-RPC endpoint. Set RELAY_CHAIN_RPC_URL env var in production.
    rpc-url: "http://localhost:8545"
    # Deployed VayuEpochSettlement address. Set RELAY_CHAIN_SETTLEMENT_ADDRESS env var in production.
    settlement-address: "0x0000000000000000000000000000000000000000"
    # Set to true and provide relay-private-key to submit real on-chain commitments.
    on-chain-commit-enabled: false
    # Relay wallet private key (hex, no 0x prefix). Set RELAY_CHAIN_RELAY_PRIVATE_KEY env var in production.
    relay-private-key: ""
