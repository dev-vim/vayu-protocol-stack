openapi: 3.1.0
info:
  title: Vayu Relay API
  version: 1.1.0
  description: |
    REST API for the Vayu relay write path.

    Relay scope is intentionally minimal:

    1. Ingests signed AQI readings from reporters
    2. Validates signatures and reporter stake
    3. Runs epoch aggregation and writes commits on-chain

    Read/query endpoints are out of scope for relay and belong to the indexer API.

    ### Authentication
    There is no API key or bearer token. Reporter identity is established
    cryptographically via the EIP-712 signature included in each reading.

    ### Epoch Cadence
    1 epoch = 1 hour. The relay collects readings during each epoch window and
    commits results shortly after the epoch closes.

    ### Versioning
    All endpoints are prefixed with /v1.

servers:
  - url: http://localhost:3000/v1
    description: Local development
  - url: https://relay.vayu.network/v1
    description: Production (Base mainnet)
  - url: https://relay-sepolia.vayu.network/v1
    description: Testnet (Base Sepolia)

tags:
  - name: Readings
    description: Submit AQI readings from edge devices
  - name: Health
    description: Relay operational status

paths:
  /readings:
    post:
      operationId: submitReading
      tags: [Readings]
      summary: Submit a signed AQI reading
      description: |
        Called by edge devices to submit a single AQI reading.

        Relay validation (in order):
        1. Schema validation
        2. Signature verification (EIP-712)
        3. Stake check (reporterStake(reporter) > 0)
        4. Timestamp freshness (within current epoch tolerance)
        5. H3 resolution check (must be resolution 8)
        6. Rate limiting (max 1 reading per reporter per 5 minutes)
        7. Mandatory field checks (aqi > 0 and pm25 > 0)

      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReadingSubmission"
      responses:
        "200":
          description: Reading accepted and queued for the current epoch
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReadingAccepted"
        "400":
          description: Validation failed (schema, signature, or mandatory fields)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Reporter has no active stake
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "429":
          description: Rate limited
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /health:
    get:
      operationId: healthCheck
      tags: [Health]
      summary: Relay health check
      description: |
        Returns relay liveness and write-path dependency status
        (chain connectivity and commit worker availability).
      responses:
        "200":
          description: Relay is healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
        "503":
          description: Relay is unhealthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

components:
  schemas:
    ReadingSubmission:
      type: object
      required:
        - reporter
        - h3Index
        - epochId
        - timestamp
        - aqi
        - pm25
        - signature
      properties:
        reporter:
          type: string
          pattern: "^0x[0-9a-fA-F]{40}$"
          description: Device Ethereum address (20 bytes, 0x-prefixed)
        h3Index:
          type: string
          pattern: "^0x[0-9a-fA-F]{16}$"
          description: H3 cell index at resolution 8 encoded as uint64 hex
        epochId:
          type: integer
          format: uint32
          description: Epoch identifier matching timestamp / epoch duration
        timestamp:
          type: integer
          format: uint32
          description: UNIX timestamp of the sensor reading
        aqi:
          type: integer
          format: uint16
          minimum: 1
          maximum: 500
        pm25:
          type: integer
          format: uint16
          minimum: 1
          maximum: 65535
        pm10:
          type: integer
          format: uint16
          minimum: 0
          maximum: 65535
          default: 0
        o3:
          type: integer
          format: uint16
          minimum: 0
          maximum: 65535
          default: 0
        no2:
          type: integer
          format: uint16
          minimum: 0
          maximum: 65535
          default: 0
        so2:
          type: integer
          format: uint16
          minimum: 0
          maximum: 65535
          default: 0
        co:
          type: integer
          format: uint16
          minimum: 0
          maximum: 65535
          default: 0
        signature:
          type: string
          pattern: "^0x[0-9a-fA-F]{130}$"
          description: 65-byte EIP-712 ECDSA signature

    ReadingAccepted:
      type: object
      properties:
        status:
          type: string
          enum: [accepted]
        epochId:
          type: integer
          format: uint32
        receivedAt:
          type: integer
          format: uint32

    HealthStatus:
      type: object
      properties:
        status:
          type: string
          enum: [healthy, degraded, unhealthy]
        version:
          type: string
        currentEpochId:
          type: integer
          format: uint32
        chainId:
          type: integer
        blockNumber:
          type: integer
        commitWorkerRunning:
          type: boolean
        lastCommittedEpoch:
          type: integer
          format: uint32
        lastCommitTxHash:
          type: string
        uptimeSeconds:
          type: integer

    Error:
      type: object
      required:
        - error
        - message
      properties:
        error:
          type: string
          description: Machine-readable error code (snake_case)
        message:
          type: string
          description: Human-readable error description
        retryAfter:
          type: integer
          description: Seconds to wait before retrying (for 429)
