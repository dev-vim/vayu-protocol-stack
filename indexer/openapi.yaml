openapi: 3.1.0
info:
  title: Vayu Indexer API
  version: 1.0.0
  description: |
    Read API for Vayu protocol data.

    Indexer scope:

    1. Exposes committed epoch metadata and aggregates
    2. Serves reporter-centric read models
    3. Provides reward proof retrieval for claims
    4. Supports dashboards, explorers, and fisherman analysis

servers:
  - url: http://localhost:4000/v1
    description: Local development
  - url: https://indexer.vayu.network/v1
    description: Production (Base mainnet)
  - url: https://indexer-sepolia.vayu.network/v1
    description: Testnet (Base Sepolia)

tags:
  - name: Epochs
    description: Query epoch commitments, aggregates, and proofs
  - name: Reporters
    description: Reporter profile and reward information
  - name: Health
    description: Indexer operational status

paths:
  /epochs/current:
    get:
      operationId: getCurrentEpoch
      tags: [Epochs]
      summary: Get current epoch info
      responses:
        "200":
          description: Current epoch information
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CurrentEpoch"

  /epochs/{epochId}:
    get:
      operationId: getEpoch
      tags: [Epochs]
      summary: Get committed epoch metadata
      parameters:
        - $ref: "#/components/parameters/EpochId"
      responses:
        "200":
          description: Epoch commitment data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EpochDetail"
        "404":
          description: Epoch not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /epochs/{epochId}/cells:
    get:
      operationId: getEpochCells
      tags: [Epochs]
      summary: List active cells for an epoch
      parameters:
        - $ref: "#/components/parameters/EpochId"
      responses:
        "200":
          description: Per-cell aggregates
          content:
            application/json:
              schema:
                type: object
                properties:
                  epochId:
                    type: integer
                  cells:
                    type: array
                    items:
                      $ref: "#/components/schemas/CellAggregate"
        "404":
          description: Epoch not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /epochs/{epochId}/proofs/{reporter}:
    get:
      operationId: getRewardProof
      tags: [Epochs]
      summary: Get reporter Merkle reward proof for an epoch
      parameters:
        - $ref: "#/components/parameters/EpochId"
        - name: reporter
          in: path
          required: true
          schema:
            type: string
            pattern: "^0x[0-9a-fA-F]{40}$"
      responses:
        "200":
          description: Reward proof data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RewardProof"
        "404":
          description: No reward found for reporter in epoch
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /reporters/{reporter}:
    get:
      operationId: getReporter
      tags: [Reporters]
      summary: Get reporter profile and stats
      parameters:
        - name: reporter
          in: path
          required: true
          schema:
            type: string
            pattern: "^0x[0-9a-fA-F]{40}$"
      responses:
        "200":
          description: Reporter profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReporterProfile"
        "404":
          description: Reporter not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /reporters/{reporter}/rewards:
    get:
      operationId: getReporterRewards
      tags: [Reporters]
      summary: List reporter rewards
      parameters:
        - name: reporter
          in: path
          required: true
          schema:
            type: string
            pattern: "^0x[0-9a-fA-F]{40}$"
        - name: status
          in: query
          required: false
          schema:
            type: string
            enum: [unclaimed, claimed, expired, all]
            default: unclaimed
      responses:
        "200":
          description: Reward entries
          content:
            application/json:
              schema:
                type: object
                properties:
                  reporter:
                    type: string
                  rewards:
                    type: array
                    items:
                      $ref: "#/components/schemas/RewardEntry"
                  totalUnclaimed:
                    type: string
        "404":
          description: Reporter not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /health:
    get:
      operationId: healthCheck
      tags: [Health]
      summary: Indexer health check
      responses:
        "200":
          description: Indexer is healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
        "503":
          description: Indexer is unhealthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

components:
  parameters:
    EpochId:
      name: epochId
      in: path
      required: true
      schema:
        type: integer
        format: uint32
        minimum: 1

  schemas:
    CurrentEpoch:
      type: object
      properties:
        epochId:
          type: integer
          format: uint32
        startTime:
          type: integer
          format: uint32
        endTime:
          type: integer
          format: uint32
        readingsCollected:
          type: integer
        activeCells:
          type: integer

    EpochDetail:
      type: object
      properties:
        epochId:
          type: integer
          format: uint32
        dataRoot:
          type: string
        rewardRoot:
          type: string
        ipfsCid:
          type: string
        relay:
          type: string
        committedAt:
          type: integer
        activeCells:
          type: integer
        totalReadings:
          type: integer
        totalRewardDistributed:
          type: string
        challengeWindowEnd:
          type: integer
          description: >
            Unix timestamp (seconds) after which the epoch is finalized.
            Clients can derive finalization status as: `now() > challengeWindowEnd`.

    CellAggregate:
      type: object
      properties:
        h3Index:
          type: string
        medianAqi:
          type: integer
        reporterCount:
          type: integer
        cellBudget:
          type: string

    RewardProof:
      type: object
      properties:
        epochId:
          type: integer
          format: uint32
        reporter:
          type: string
        h3Index:
          type: string
        amount:
          type: string
        proof:
          type: array
          items:
            type: string
        leafIndex:
          type: integer

    ReporterProfile:
      type: object
      properties:
        reporter:
          type: string
        stake:
          type: string
        totalReadings:
          type: integer
        avgScore:
          type: number
          format: float
        totalRewardsEarned:
          type: string
        consecutiveZeroEpochs:
          type: integer
        lastActiveEpoch:
          type: integer
          format: uint32
        activeSinceEpoch:
          type: integer
          format: uint32

    RewardEntry:
      type: object
      properties:
        epochId:
          type: integer
          format: uint32
        h3Index:
          type: string
        amount:
          type: string
        status:
          type: string
          enum: [unclaimed, claimed, expired]
        proof:
          type: array
          items:
            type: string
        claimableAfter:
          type: integer
        expiresAt:
          type: integer

    HealthStatus:
      type: object
      properties:
        status:
          type: string
          enum: [healthy, degraded, unhealthy]
        version:
          type: string
        chainId:
          type: integer
        blockNumber:
          type: integer
        ipfsConnected:
          type: boolean
        indexedUpToBlock:
          type: integer
        uptimeSeconds:
          type: integer

    Error:
      type: object
      required:
        - error
        - message
      properties:
        error:
          type: string
        message:
          type: string
